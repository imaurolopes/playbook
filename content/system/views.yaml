schemaVersion: "2"
defaultView: concept-periodic

agentPackage:
  schema: agent-knowledge-package
  packageVersion: "1"
  defaultFile: context
  files:
    - id: context
      filename: context.md
      label: Context
      format: markdown
    - id: project
      filename: project.yaml
      label: Project
      format: yaml
    - id: skills
      filename: skills.yaml
      label: Skills
      format: yaml
    - id: selected-artifacts
      filename: selected-artifacts.yaml
      label: Selected Artifacts
      format: yaml
    - id: risks
      filename: risks.yaml
      label: Risks
      format: yaml
    - id: open-questions
      filename: open-questions.yaml
      label: Open Questions
      format: yaml
    - id: outputs
      filename: outputs.yaml
      label: Outputs
      format: yaml
    - id: relationships
      filename: relationships.yaml
      label: Relationships
      format: yaml

viewEngine:
  selectors:
    levelAttribute: level
    categoryAttribute: categories
    artifactKindAttribute: artifactKind

  selector:
    enabled: false
    persistence: query
    parameter: view
    availableLayouts:
      - catalog
      - periodic
      - detail
      - table
      - timeline
      - kanban
      - graph-placeholder

  breadcrumbs:
    enabled: true
    rootLabel: Concept Map
    rootRoute: /
    showOn:
      - local
      - detail

  fallback:
    layout: catalog
    cardDensity: comfortable
    enabledPanels:
      - detail
    detailSections:
      - attributes
      - relationships
      - content
      - documents
      - actions

  panels:
    relationshipGraph:
      enabledFromLevel: level-1
      defaultState: compact
      collapsible: true
      depth: 1

  defaults:
    level:
      level-0:
        layout: periodic
        cardDensity: spacious
      level-1:
        layout: catalog
        cardDensity: compact
        enabledPanels:
          - detail
          - relationshipGraph
      level-2:
        layout: kanban
        cardDensity: compact
        enabledPanels:
          - detail
          - relationshipGraph
      level-3:
        layout: detail
        cardDensity: comfortable
        enabledPanels:
          - detail
          - relationshipGraph
    schema:
      project-workspace:
        layout: workspace
        selectorEnabled: false
        enabledPanels:
          - relationshipGraph
        detailSections:
          - overview
          - status
          - stakeholders
          - constraints
          - stages
          - selectedSkills
          - selectedTemplates
          - selectedChecklists
          - selectedDecisionMatrices
          - selectedArtifacts
          - risks
          - openQuestions
          - outputs
          - relationships
    artifactKind:
      skill:
        layout: skill
        selectorEnabled: false
        detailSections:
          - overview
          - inputs
          - questions
          - decisionRules
          - outputs
          - guidance
          - risks
          - checklist
          - references
          - relationships
      template:
        layout: artifact
        selectorEnabled: false
        detailSections:
          - overview
          - inputs
          - sections
          - completionCriteria
          - references
          - relationships
      checklist:
        layout: artifact
        selectorEnabled: false
        detailSections:
          - overview
          - prerequisites
          - items
          - evidenceRequirements
          - references
          - relationships
      guideline:
        layout: artifact
        selectorEnabled: false
        detailSections:
          - overview
          - principles
          - recommendations
          - antiPatterns
          - examples
          - references
          - relationships
      decision-matrix:
        layout: artifact
        selectorEnabled: false
        detailSections:
          - overview
          - options
          - criteria
          - rules
          - references
          - relationships

  overrides:
    categories:
      processing:
        level-1:
          layout: periodic
      skills:
        level-1:
          layout: catalog
      sources:
        level-1:
          layout: timeline

    nodes:
      architecture-direction:
        layout: detail
        selectorEnabled: false

  layouts:
    periodic:
      label: Periodic
      enabled: true
    catalog:
      label: Catalog
      enabled: true
    kanban:
      label: Kanban
      enabled: true
      groupBy: attributes.lifecycle
    detail:
      label: Detail
      enabled: true
    skill:
      label: Skill
      enabled: true
    artifact:
      label: Artifact
      enabled: true
    workspace:
      label: Workspace
      enabled: true
    timeline:
      label: Timeline
      enabled: true
      dateField: provenance.capturedAt
    table:
      label: Table
      enabled: true
      columns:
        - title
        - attributes.level
        - attributes.lifecycle
    graph-placeholder:
      label: Graph
      enabled: true

views:
  - id: concept-periodic
    label: Concept Map
    layout: taxonomy-periodic
    source: taxonomy
    taxonomy: categories
    routeTemplate: /categories/{value}
    localView: category-local
    displayLevel: level-0
    selectorEnabled: false
    countBy: attributes.categories
    fields:
      - label
      - code
      - summary
      - icon
      - color
    presentation:
      groupDimension: categories
      showEmptyGroups: true
      density: spacious

  - id: category-local
    label: Local View
    layout: entry-periodic
    source: entries
    routeTemplate: /categories/{value}
    displayLevel: level-1
    selectorEnabled: true
    routeFilter:
      path: attributes.categories
      parameter: value
    sortBy: title
    fields:
      - title
      - summary
      - attributes.artifactKind
      - attributes.lifecycle
      - attributes.level
      - attributes.tags
    presentation:
      colorDimension: categories
      iconDimension: artifactKind
      badgeDimensions:
        - lifecycle
        - artifactKind
        - level
      tagsAttribute: tags

  - id: catalog
    label: Catalog
    layout: cards
    source: entries
    fields:
      - title
      - summary
      - attributes.categories
      - attributes.artifactKind
      - attributes.level
    sortBy: title

  - id: category-groups
    label: Category Groups
    layout: grouped-cards
    source: entries
    groupBy: attributes.categories
    allowMultiplePlacement: true
    sortBy: title

  - id: levels
    label: Levels
    layout: hierarchical-cards
    source: entries
    groupBy: attributes.level
    sortBy: title

  - id: artifact-kinds
    label: Artifact Kinds
    layout: grouped-list
    source: entries
    groupBy: attributes.artifactKind
    sortBy: title

  - id: lifecycle
    label: Lifecycle
    layout: columns
    source: entries
    groupBy: attributes.lifecycle
    sortBy: title
