schemaVersion: "1"
defaultView: concept-periodic

views:
  - id: concept-periodic
    label: Concept Map
    layout: taxonomy-periodic
    source: taxonomy
    taxonomy: categories
    routeTemplate: /categories/{value}
    localView: category-local
    countBy: attributes.categories
    fields:
      - label
      - code
      - summary
      - icon
      - color
    presentation:
      groupDimension: categories
      showEmptyGroups: true
      density: spacious

  - id: category-local
    label: Local View
    layout: entry-periodic
    source: entries
    routeTemplate: /categories/{value}
    routeFilter:
      path: attributes.categories
      parameter: value
    sortBy: title
    fields:
      - title
      - summary
      - attributes.artifactKind
      - attributes.lifecycle
      - attributes.level
      - attributes.tags
    presentation:
      colorDimension: categories
      iconDimension: artifactKind
      badgeDimensions:
        - lifecycle
        - artifactKind
        - level
      tagsAttribute: tags
      density: compact
    detailPanel:
      sections:
        - attributes
        - relationships
        - documents
        - actions
      showAllAttributes: true

  - id: catalog
    label: Catalog
    layout: cards
    source: entries
    fields:
      - title
      - summary
      - attributes.categories
      - attributes.artifactKind
      - attributes.level
    sortBy: title

  - id: category-groups
    label: Category Groups
    layout: grouped-cards
    source: entries
    groupBy: attributes.categories
    allowMultiplePlacement: true
    sortBy: title

  - id: levels
    label: Levels
    layout: hierarchical-cards
    source: entries
    groupBy: attributes.level
    sortBy: title

  - id: artifact-kinds
    label: Artifact Kinds
    layout: grouped-list
    source: entries
    groupBy: attributes.artifactKind
    sortBy: title

  - id: lifecycle
    label: Lifecycle
    layout: columns
    source: entries
    groupBy: attributes.lifecycle
    sortBy: title
