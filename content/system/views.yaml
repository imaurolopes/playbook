schemaVersion: "2"
defaultView: concept-periodic

viewEngine:
  selectors:
    levelAttribute: level
    categoryAttribute: categories

  fallback:
    layout: catalog
    cardDensity: comfortable
    enabledPanels:
      - detail
    detailSections:
      - attributes
      - relationships
      - content
      - documents
      - actions

  panels:
    relationshipGraph:
      enabledFromLevel: level-1
      defaultState: compact
      collapsible: true
      depth: 1

  defaults:
    level:
      level-0:
        layout: periodic
        cardDensity: spacious
      level-1:
        layout: catalog
        cardDensity: compact
        enabledPanels:
          - detail
          - relationshipGraph
      level-2:
        layout: kanban
        cardDensity: compact
        enabledPanels:
          - detail
          - relationshipGraph
      level-3:
        layout: detail
        cardDensity: comfortable
        enabledPanels:
          - detail
          - relationshipGraph

  overrides:
    categories:
      processing:
        level-1:
          layout: periodic
      skills:
        level-1:
          layout: catalog
      sources:
        level-1:
          layout: timeline

    nodes:
      architecture-direction:
        layout: detail

  layouts:
    periodic:
      enabled: true
    catalog:
      enabled: true
    kanban:
      enabled: true
      groupBy: attributes.lifecycle
    detail:
      enabled: true
    timeline:
      enabled: true
      dateField: provenance.capturedAt
    table:
      enabled: true
      columns:
        - title
        - attributes.level
        - attributes.lifecycle
    graph-placeholder:
      enabled: true

views:
  - id: concept-periodic
    label: Concept Map
    layout: taxonomy-periodic
    source: taxonomy
    taxonomy: categories
    routeTemplate: /categories/{value}
    localView: category-local
    displayLevel: level-0
    countBy: attributes.categories
    fields:
      - label
      - code
      - summary
      - icon
      - color
    presentation:
      groupDimension: categories
      showEmptyGroups: true
      density: spacious

  - id: category-local
    label: Local View
    layout: entry-periodic
    source: entries
    routeTemplate: /categories/{value}
    displayLevel: level-1
    routeFilter:
      path: attributes.categories
      parameter: value
    sortBy: title
    fields:
      - title
      - summary
      - attributes.artifactKind
      - attributes.lifecycle
      - attributes.level
      - attributes.tags
    presentation:
      colorDimension: categories
      iconDimension: artifactKind
      badgeDimensions:
        - lifecycle
        - artifactKind
        - level
      tagsAttribute: tags

  - id: catalog
    label: Catalog
    layout: cards
    source: entries
    fields:
      - title
      - summary
      - attributes.categories
      - attributes.artifactKind
      - attributes.level
    sortBy: title

  - id: category-groups
    label: Category Groups
    layout: grouped-cards
    source: entries
    groupBy: attributes.categories
    allowMultiplePlacement: true
    sortBy: title

  - id: levels
    label: Levels
    layout: hierarchical-cards
    source: entries
    groupBy: attributes.level
    sortBy: title

  - id: artifact-kinds
    label: Artifact Kinds
    layout: grouped-list
    source: entries
    groupBy: attributes.artifactKind
    sortBy: title

  - id: lifecycle
    label: Lifecycle
    layout: columns
    source: entries
    groupBy: attributes.lifecycle
    sortBy: title
