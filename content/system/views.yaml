schemaVersion: "1"
defaultView: catalog

views:
  - id: catalog
    label: Catalog
    layout: cards
    source: entries
    fields:
      - title
      - summary
      - attributes.categories
      - attributes.artifactKind
      - attributes.level
    sortBy: title

  - id: category-groups
    label: Category Groups
    layout: grouped-cards
    source: entries
    groupBy: attributes.categories
    allowMultiplePlacement: true
    sortBy: title

  - id: levels
    label: Levels
    layout: hierarchical-cards
    source: entries
    groupBy: attributes.level
    sortBy: title

  - id: artifact-kinds
    label: Artifact Kinds
    layout: grouped-list
    source: entries
    groupBy: attributes.artifactKind
    sortBy: title

  - id: lifecycle
    label: Lifecycle
    layout: columns
    source: entries
    groupBy: attributes.lifecycle
    sortBy: title
