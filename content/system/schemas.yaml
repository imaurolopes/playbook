schemaVersion: "1"
schemas:
  - id: reusable-entry
    label: Reusable knowledge entry
    storage: entries
    required:
      - schemaVersion
      - id
      - schema
      - title
      - route
    fields:
      summary:
        type: string
      attributes:
        type: object
        taxonomyDriven: true
      relationships:
        type: list
        itemSchema: relationship
      content:
        type: list
        itemSchema: content-block
      documents:
        type: list
        itemSchema: document-reference

  - id: project-output
    label: Project-specific output
    storage: projects
    required:
      - schemaVersion
      - id
      - schema
      - project
      - title
    fields:
      project:
        type: string
      attributes:
        type: object
        taxonomyDriven: true
      sourceEntries:
        type: list
      data:
        type: object
      documents:
        type: list

  - id: knowledge-source
    label: Knowledge source
    storage: sources
    required:
      - schemaVersion
      - id
      - schema
      - title
      - attributes
      - provenance
    fields:
      summary:
        type: string
      attributes:
        type: object
        taxonomyDriven: true
      provenance:
        type: object
        itemSchema: provenance
      relationships:
        type: list
        itemSchema: relationship
      content:
        type: list
        itemSchema: content-block
      supportingMaterials:
        type: list
        itemSchema: supporting-material

definitions:
  relationship:
    required:
      - type
      - target
    fields:
      type:
        type: string
        taxonomy: relationshipKind
      target:
        type: string

  content-block:
    required:
      - kind
    open: true

  document-reference:
    required:
      - path
    fields:
      path:
        type: string
      label:
        type: string

  provenance:
    required:
      - origin
      - capturedAt
    open: true
    fields:
      origin:
        type: string
      locator:
        type: string
      capturedBy:
        type: string
      capturedAt:
        type: string

  supporting-material:
    required:
      - kind
      - locator
    open: true
    fields:
      kind:
        type: string
      locator:
        type: string
      label:
        type: string
