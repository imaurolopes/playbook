schemaVersion: "1"
schemas:
  - id: reusable-entry
    label: Reusable knowledge entry
    storage: entries
    required:
      - schemaVersion
      - id
      - schema
      - title
      - route
    fields:
      summary:
        type: string
      attributes:
        type: object
        taxonomyDriven: true
      relationships:
        type: list
        itemSchema: relationship
      content:
        type: list
        itemSchema: content-block
      documents:
        type: list
        itemSchema: document-reference

  - id: operational-skill
    label: Operational skill
    storage: entries
    extends: reusable-entry
    required:
      - schemaVersion
      - id
      - schema
      - title
      - route
      - attributes
      - objective
      - expectedOutputs
    constraints:
      attributes.artifactKind:
        equals: skill
    fields:
      objective:
        type: string
      whenToUse:
        type: list
      requiredInputs:
        type: list
        itemSchema: open-item
      questions:
        type: list
        itemSchema: open-item
      decisionRules:
        type: list
        itemSchema: open-item
      expectedOutputs:
        type: list
        itemSchema: open-item
      guidance:
        type: list
        itemSchema: open-item
      risks:
        type: list
        itemSchema: open-item
      checklist:
        type: list
        itemSchema: open-item
      references:
        type: list
        itemSchema: node-reference
      relationships:
        type: list
        itemSchema: relationship

  - id: operational-template
    label: Operational template
    storage: entries
    extends: reusable-entry
    required:
      - schemaVersion
      - id
      - schema
      - title
      - route
      - attributes
      - purpose
      - sections
    constraints:
      attributes.artifactKind:
        equals: template
    fields:
      purpose:
        type: string
      requiredInputs:
        type: list
        itemSchema: open-item
      sections:
        type: list
        itemSchema: artifact-section
      completionCriteria:
        type: list
        itemSchema: open-item
      references:
        type: list
        itemSchema: node-reference
      relationships:
        type: list
        itemSchema: relationship

  - id: operational-checklist
    label: Operational checklist
    storage: entries
    extends: reusable-entry
    required:
      - schemaVersion
      - id
      - schema
      - title
      - route
      - attributes
      - purpose
      - items
    constraints:
      attributes.artifactKind:
        equals: checklist
    fields:
      purpose:
        type: string
      prerequisites:
        type: list
        itemSchema: open-item
      items:
        type: list
        itemSchema: checklist-item
      evidenceRequirements:
        type: list
        itemSchema: open-item
      references:
        type: list
        itemSchema: node-reference
      relationships:
        type: list
        itemSchema: relationship

  - id: operational-guideline
    label: Operational guideline
    storage: entries
    extends: reusable-entry
    required:
      - schemaVersion
      - id
      - schema
      - title
      - route
      - attributes
      - purpose
      - principles
    constraints:
      attributes.artifactKind:
        equals: guideline
    fields:
      purpose:
        type: string
      principles:
        type: list
        itemSchema: open-item
      recommendations:
        type: list
        itemSchema: open-item
      antiPatterns:
        type: list
        itemSchema: open-item
      examples:
        type: list
        itemSchema: open-item
      references:
        type: list
        itemSchema: node-reference
      relationships:
        type: list
        itemSchema: relationship

  - id: operational-decision-matrix
    label: Operational decision matrix
    storage: entries
    extends: reusable-entry
    required:
      - schemaVersion
      - id
      - schema
      - title
      - route
      - attributes
      - decision
      - options
      - criteria
    constraints:
      attributes.artifactKind:
        equals: decision-matrix
    fields:
      decision:
        type: string
      options:
        type: list
        itemSchema: matrix-option
      criteria:
        type: list
        itemSchema: matrix-criterion
      rules:
        type: list
        itemSchema: open-item
      references:
        type: list
        itemSchema: node-reference
      relationships:
        type: list
        itemSchema: relationship

  - id: project-output
    label: Project-specific output
    storage: projects
    required:
      - schemaVersion
      - id
      - schema
      - project
      - title
    fields:
      summary:
        type: string
      project:
        type: string
      attributes:
        type: object
        taxonomyDriven: true
      sourceEntries:
        type: list
      data:
        type: object
      documents:
        type: list
      relationships:
        type: list
        itemSchema: relationship

  - id: project-workspace
    label: Project workspace
    storage: projects
    required:
      - schemaVersion
      - id
      - schema
      - title
      - route
      - status
      - lifecycle
      - stages
    fields:
      summary:
        type: string
      route:
        type: string
      status:
        type: string
        taxonomy: projectStatus
      lifecycle:
        type: string
        taxonomy: lifecycle
      categories:
        type: list
        taxonomy: categories
      attributes:
        type: object
        taxonomyDriven: true
      stakeholders:
        type: list
        itemSchema: stakeholder
      constraints:
        type: list
        itemSchema: open-item
      stages:
        type: list
        itemSchema: project-stage
      selectedSkills:
        type: list
        itemSchema: node-reference
      selectedTemplates:
        type: list
        itemSchema: node-reference
      selectedChecklists:
        type: list
        itemSchema: node-reference
      selectedDecisionMatrices:
        type: list
        itemSchema: node-reference
      selectedArtifacts:
        type: list
        itemSchema: node-reference
      outputs:
        type: list
        itemSchema: node-reference
      risks:
        type: list
        itemSchema: project-risk
      openQuestions:
        type: list
        itemSchema: open-item
      relationships:
        type: list
        itemSchema: relationship
      actions:
        type: list
        itemSchema: action

  - id: agent-knowledge-package
    label: Agent knowledge package
    storage: generated
    required:
      - schemaVersion
      - schema
      - project
      - generatedFiles
    fields:
      project:
        type: string
      packageVersion:
        type: string
      generatedFiles:
        type: list
        itemSchema: package-file
      relationships:
        type: list
        itemSchema: relationship

  - id: knowledge-source
    label: Knowledge source
    storage: sources
    required:
      - schemaVersion
      - id
      - schema
      - title
      - attributes
      - provenance
    fields:
      summary:
        type: string
      attributes:
        type: object
        taxonomyDriven: true
      provenance:
        type: object
        itemSchema: provenance
      relationships:
        type: list
        itemSchema: relationship
      content:
        type: list
        itemSchema: content-block
      supportingMaterials:
        type: list
        itemSchema: supporting-material

definitions:
  open-item:
    open: true

  node-reference:
    required:
      - target
    open: true
    fields:
      target:
        type: string
      label:
        type: string

  stakeholder:
    required:
      - id
      - label
    open: true
    fields:
      id:
        type: string
      label:
        type: string
      role:
        type: string

  project-stage:
    required:
      - stage
      - status
    open: true
    fields:
      stage:
        type: string
        taxonomy: projectStage
      status:
        type: string
        taxonomy: projectStatus
      summary:
        type: string
      outputs:
        type: list
        itemSchema: node-reference

  project-risk:
    required:
      - id
      - label
    open: true
    fields:
      id:
        type: string
      label:
        type: string
      status:
        type: string
        taxonomy: projectStatus
      owner:
        type: string
      mitigation:
        type: string

  action:
    required:
      - label
      - href
    open: true
    fields:
      label:
        type: string
      href:
        type: string
      icon:
        type: string
      appearance:
        type: string

  package-file:
    required:
      - id
      - filename
      - format
    open: true
    fields:
      id:
        type: string
      filename:
        type: string
      label:
        type: string
      format:
        type: string

  artifact-section:
    required:
      - id
      - label
    open: true

  checklist-item:
    required:
      - id
      - label
    open: true

  matrix-option:
    required:
      - id
      - label
    open: true

  matrix-criterion:
    required:
      - id
      - label
    open: true

  relationship:
    required:
      - type
      - target
    fields:
      type:
        type: string
        taxonomy: relationshipKind
      target:
        type: string

  content-block:
    required:
      - kind
    open: true

  document-reference:
    required:
      - path
    fields:
      path:
        type: string
      label:
        type: string

  provenance:
    required:
      - origin
      - capturedAt
    open: true
    fields:
      origin:
        type: string
      locator:
        type: string
      capturedBy:
        type: string
      capturedAt:
        type: string

  supporting-material:
    required:
      - kind
      - locator
    open: true
    fields:
      kind:
        type: string
      locator:
        type: string
      label:
        type: string
