schemaVersion: "1"

dimensions:
  - id: categories
    label: Categories
    cardinality: many
    groups:
      - id: assessment
        label: Assessment
        order: 10
      - id: engineering
        label: Engineering
        order: 20
      - id: operations
        label: Operations
        order: 30
      - id: enablement
        label: Enablement
        order: 40
    options:
      - value: discovery
        label: Discovery
        code: DISC
        summary: Frame outcomes, context, evidence, and unknowns.
        group: assessment
        icon: search
        color: "#0284c7"
        order: 10
      - value: business-assessment
        label: Business Assessment
        code: BIZ
        summary: Connect initiatives to value, ownership, and urgency.
        group: assessment
        icon: chart-no-axes-combined
        color: "#4f46e5"
        order: 20
      - value: technical-assessment
        label: Technical Assessment
        code: TECH
        summary: Understand systems, constraints, and delivery conditions.
        group: assessment
        icon: scan-search
        color: "#7c3aed"
        order: 30
      - value: requirements
        label: Requirements
        code: REQ
        summary: Shape needs into traceable and testable statements.
        group: assessment
        icon: list-checks
        color: "#2563eb"
        order: 40
      - value: budget
        label: Budget
        code: BUD
