        label: Processing
        code: PROC
        summary: Transform work and data with clear execution semantics.
        group: engineering
        icon: workflow
        color: "#ea580c"
        order: 120
      - value: storage
        label: Storage
        code: STOR
        summary: Preserve information with intentional consistency and lifecycle.
