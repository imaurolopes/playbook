        icon: database
        color: "#0369a1"
        order: 130
      - value: observability
        label: Observability
        code: OBS
        summary: Make behavior understandable through meaningful signals.
        group: operations
        icon: activity
        color: "#0891b2"
        order: 140
      - value: testing
        label: Testing
        code: TEST
        summary: Build confidence with risk-aligned verification.
        group: operations
        icon: flask-conical
        color: "#059669"
        order: 150
      - value: skills
        label: Skills
        code: SKL
        summary: Develop repeatable human and agent capabilities.
        group: enablement
        icon: graduation-cap
        color: "#6366f1"
        order: 160
      - value: checklists
        label: Checklists
        code: CHK
        summary: Turn expectations into concise evidence prompts.
        group: enablement
        icon: clipboard-check
        color: "#65a30d"
        order: 170
      - value: agent-packages
        label: Agent Packages
        code: AGT
        summary: Organize bounded knowledge for future agent use.
        group: enablement
        icon: bot
        color: "#0f766e"
        order: 180

